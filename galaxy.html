<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>银河系 - 粒子宇宙</title>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #000005;
      overflow: hidden;
      color: #fff;
    }

    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
    }

    #back-btn {
      position: fixed;
      top: 24px;
      left: 24px;
      padding: 12px 20px;
      background: rgba(15, 15, 25, 0.75);
      border: 1px solid rgba(139, 92, 246, 0.3);
      border-radius: 12px;
      color: #fff;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.25s ease;
    }

    #back-btn:hover {
      background: rgba(25, 25, 45, 0.9);
      border-color: rgba(139, 92, 246, 0.5);
      transform: translateX(-4px);
    }

    .fullscreen-btn {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 20;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.5);
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .fullscreen-btn:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(139, 92, 246, 0.3);
      color: rgba(139, 92, 246, 0.8);
    }

    #control-panel {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 16px;
      z-index: 100;
    }

    .galaxy-layer-btn {
      padding: 16px 28px;
      background: rgba(15, 15, 25, 0.85);
      border: 1px solid rgba(139, 92, 246, 0.3);
      border-radius: 16px;
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .galaxy-layer-btn:hover {
      background: rgba(30, 30, 55, 0.9);
      border-color: rgba(139, 92, 246, 0.6);
      transform: translateY(-4px);
      box-shadow: 0 8px 32px rgba(139, 92, 246, 0.2);
    }

    .galaxy-layer-btn.active {
      background: rgba(139, 92, 246, 0.25);
      border-color: #8b5cf6;
    }

    .layer-indicator {
      position: fixed;
      top: 50%;
      right: 32px;
      transform: translateY(-50%);
      z-index: 100;
    }

    .layer-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      margin-bottom: 12px;
      background: rgba(15, 15, 25, 0.7);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: all 0.3s ease;
      cursor: pointer;
      min-width: 180px;
    }

    .layer-item:hover {
      background: rgba(25, 25, 45, 0.85);
      border-color: rgba(139, 92, 246, 0.3);
    }

    .layer-item.active {
      background: rgba(139, 92, 246, 0.15);
      border-color: rgba(139, 92, 246, 0.5);
    }

    .layer-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .layer-dot.disk { background: linear-gradient(135deg, #fbbf24, #f59e0b); }
    .layer-dot.bulge { background: linear-gradient(135deg, #fb923c, #ea580c); }
    .layer-dot.halo { background: linear-gradient(135deg, #a78bfa, #7c3aed); }
    .layer-dot.dark { background: linear-gradient(135deg, rgba(139,92,246,0.3), rgba(59,30,139,0.3)); border: 1px dashed rgba(139,92,246,0.5); }

    .layer-name {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.85);
    }

    .layer-desc {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.4);
      margin-top: 2px;
    }

    #info-panel {
      position: fixed;
      top: 80px;
      left: 24px;
      max-width: 280px;
      padding: 20px;
      background: rgba(15, 15, 25, 0.85);
      border: 1px solid rgba(139, 92, 246, 0.25);
      border-radius: 16px;
      z-index: 100;
      backdrop-filter: blur(20px);
      transition: opacity 0.3s ease;
    }

    #info-panel h3 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #info-panel p {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
      line-height: 1.6;
    }

    #transition-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #000005;
      z-index: 9999;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    #transition-overlay.fading {
      opacity: 1;
      pointer-events: auto;
    }

    .transition-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border: 2px solid rgba(139, 92, 246, 0.6);
      border-radius: 50%;
      animation: ringExpand 0.5s ease forwards;
    }

    @keyframes ringExpand {
      from { width: 0; height: 0; opacity: 1; }
      to { width: 600px; height: 600px; opacity: 0; }
    }

    .hint-text {
      position: fixed;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
      z-index: 100;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="transition-overlay"></div>
  <div id="canvas-container"></div>

  <button id="back-btn" onclick="goBack()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
    返回首页
  </button>

  <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

  <div id="info-panel">
    <h3 id="layer-title">🌌 银河系</h3>
    <p id="layer-desc">包含银盘、银核、银晕和暗物质晕的壮丽星系</p>
  </div>

  <div class="layer-indicator">
    <div class="layer-item active" data-layer="disk" onclick="highlightLayer('disk')">
      <div class="layer-dot disk"></div>
      <div>
        <div class="layer-name">银盘</div>
        <div class="layer-desc">恒星形成区，旋臂结构</div>
      </div>
    </div>
    <div class="layer-item" data-layer="bulge" onclick="highlightLayer('bulge')">
      <div class="layer-dot bulge"></div>
      <div>
        <div class="layer-name">银心</div>
        <div class="layer-desc">星系核心，密度最高</div>
      </div>
    </div>
    <div class="layer-item" data-layer="halo" onclick="highlightLayer('halo')">
      <div class="layer-dot halo"></div>
      <div>
        <div class="layer-name">银晕</div>
        <div class="layer-desc">老年球状星团分布区</div>
      </div>
    </div>
    <div class="layer-item" data-layer="dark" onclick="highlightLayer('dark')">
      <div class="layer-dot dark"></div>
      <div>
        <div class="layer-name">暗物质晕</div>
        <div class="layer-desc">不可见的引力支架</div>
      </div>
    </div>
  </div>

  <p class="hint-text">拖拽旋转视角 · 滚轮缩放 · 点击右侧组件查看详情</p>

  <div id="control-panel">
    <button class="galaxy-layer-btn" onclick="highlightLayer('disk')">
      <span>🌌</span> 银盘
    </button>
    <button class="galaxy-layer-btn" onclick="highlightLayer('bulge')">
      <span>☀️</span> 银心
    </button>
    <button class="galaxy-layer-btn" onclick="highlightLayer('halo')">
      <span>✨</span> 银晕
    </button>
    <button class="galaxy-layer-btn" onclick="goToSolarSystem()">
      <span>🪐</span> 进入太阳系
    </button>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    let scene, camera, renderer, composer;
    let diskParticles, bulgeParticles, haloParticles, darkMatterParticles;
    let spiralArms;
    let currentHighlight = null;
    let targetHighlight = null;

    const layerInfo = {
      disk: { title: '🌌 银盘', desc: '银河系的主盘面结构，包含年轻的恒星、气体和尘埃。旋臂是恒星形成的活跃区域。' },
      bulge: { title: '☀️ 银心', desc: '银河系中心区域，恒星密度最高。包含大量老年恒星和一个大质量黑洞。' },
      halo: { title: '✨ 银晕', desc: '包围银河系的球状结构，主要包含老年恒星和球状星团。' },
      dark: { title: '🔮 暗物质晕', desc: '不可见的暗物质构成的巨大晕轮，提供维持星系旋转的额外引力。' }
    };

    const vertexShader = `
      attribute float size;
      attribute vec3 customColor;
      attribute float alpha;
      varying vec3 vColor;
      varying float vAlpha;
      uniform float uTime;

      void main() {
        vColor = customColor;
        vAlpha = alpha;
        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
        float pulse = 1.0 + 0.08 * sin(uTime * 2.0 + position.x * 3.0 + position.y * 2.0);
        gl_PointSize = size * pulse * (250.0 / -mvPosition.z);
        gl_Position = projectionMatrix * mvPosition;
      }
    `;

    const fragmentShader = `
      varying vec3 vColor;
      varying float vAlpha;
      uniform float uTime;

      void main() {
        vec2 center = gl_PointCoord - vec2(0.5);
        float dist = length(center);
        if (dist > 0.5) discard;

        float alpha = 1.0 - smoothstep(0.15, 0.5, dist);
        float core = 1.0 - smoothstep(0.0, 0.2, dist);
        vec3 finalColor = vColor * (0.6 + core * 0.4);
        gl_FragColor = vec4(finalColor, alpha * vAlpha * 0.7);
      }
    `;

    const darkMatterVertexShader = `
      attribute float size;
      attribute float alpha;
      varying float vAlpha;
      uniform float uTime;

      void main() {
        vAlpha = alpha;
        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
        gl_PointSize = size * (300.0 / -mvPosition.z);
        gl_Position = projectionMatrix * mvPosition;
      }
    `;

    const darkMatterFragmentShader = `
      varying float vAlpha;
      uniform float uTime;

      void main() {
        vec2 center = gl_PointCoord - vec2(0.5);
        float dist = length(center);
        if (dist > 0.5) discard;

        float alpha = (1.0 - smoothstep(0.0, 0.5, dist)) * vAlpha * 0.15;
        gl_FragColor = vec4(0.6, 0.3, 1.0, alpha);
      }
    `;

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x000000);

      camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(60, 25, 0);
      camera.lookAt(0, 0, 0);

      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      document.getElementById('canvas-container').appendChild(renderer.domElement);

      composer = new EffectComposer(renderer);
      composer.addPass(new RenderPass(scene, camera));

      const bloomPass = new UnrealBloomPass(
        new THREE.Vector2(window.innerWidth, window.innerHeight),
        0.35, 0.6, 0.92
      );
      composer.addPass(bloomPass);

      createGalaxyComponents();
      setupEventListeners();
      animate();
    }

    function createGalaxyComponents() {
      createDisk();
      createBulge();
      createHalo();
      createDarkMatterHalo();
      createBackgroundStars();
    }

    function createDisk() {
      const particleCount = 60000;
      const geometry = new THREE.BufferGeometry();
      const positions = new Float32Array(particleCount * 3);
      const colors = new Float32Array(particleCount * 3);
      const sizes = new Float32Array(particleCount);
      const alphas = new Float32Array(particleCount);

      const diskRadius = 50;
      const diskHeight = 1.5;
      const armCount = 2;
      const spiralTightness = 0.25;

      const colorArm = new THREE.Color(0x8ab4f8);
      const colorArmBright = new THREE.Color(0xc8daf5);
      const colorDust = new THREE.Color(0x3a3a4a);
      const colorWarm = new THREE.Color(0xb8c8e0);

      for (let i = 0; i < particleCount; i++) {
        const i3 = i * 3;

        const r = Math.pow(Math.random(), 0.7) * diskRadius;
        const theta = Math.random() * Math.PI * 2;

        const spiralPhase = theta - r * spiralTightness;
        const armIndex = Math.round(spiralPhase * armCount / (Math.PI * 2));
        const armCenterPhase = (armIndex * Math.PI * 2 / armCount + r * spiralTightness);
        const distToArm = Math.abs(((theta - armCenterPhase + Math.PI) % (Math.PI * 2)) - Math.PI);

        const armWidth = 0.25 + Math.exp(-r / 18) * 0.4;
        const inArm = distToArm < armWidth;
        const inDustLane = distToArm > armWidth && distToArm < armWidth + 0.15;

        let finalTheta = theta;
        let finalR = r;

        if (inArm) {
          const armStrength = 1 - distToArm / armWidth;
          finalTheta = armCenterPhase + (Math.random() - 0.5) * armWidth * 0.5;
          finalR = r + (Math.random() - 0.5) * 2.5;
        } else if (inDustLane) {
          finalR = r + (Math.random() - 0.5) * 1.5;
        } else {
          finalR = r + (Math.random() - 0.5) * 4;
        }

        const yScale = 1 - r / diskRadius;
        const y = (Math.random() - 0.5) * diskHeight * yScale * yScale;

        positions[i3] = Math.cos(finalTheta) * finalR;
        positions[i3 + 1] = y;
        positions[i3 + 2] = Math.sin(finalTheta) * finalR;

        let color;
        let alpha;
        let size;

        if (inArm) {
          const armStrength = 1 - distToArm / armWidth;
          const brightMix = Math.random();
          if (brightMix < 0.3) {
            color = colorArmBright.clone();
          } else if (brightMix < 0.7) {
            color = colorArm.clone().lerp(colorArmBright, Math.random() * 0.4);
          } else {
            color = colorArm.clone().lerp(colorWarm, Math.random() * 0.3);
          }
          alpha = 0.25 + armStrength * 0.35 + Math.random() * 0.15;
          size = 0.6 + armStrength * 1.2 + Math.random() * 0.6;
        } else if (inDustLane) {
          color = colorDust.clone();
          alpha = 0.08 + Math.random() * 0.12;
          size = 0.4 + Math.random() * 0.8;
        } else {
          const faintMix = Math.random();
          if (faintMix < 0.4) {
            color = colorArm.clone().multiplyScalar(0.4 + Math.random() * 0.3);
          } else {
            color = colorDust.clone().multiplyScalar(0.6 + Math.random() * 0.4);
          }
          alpha = 0.05 + Math.random() * 0.12;
          size = 0.3 + Math.random() * 0.6;
        }

        colors[i3] = color.r;
        colors[i3 + 1] = color.g;
        colors[i3 + 2] = color.b;
        sizes[i] = size;
        alphas[i] = alpha;
      }

      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute('customColor', new THREE.BufferAttribute(colors, 3));
      geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
      geometry.setAttribute('alpha', new THREE.BufferAttribute(alphas, 1));

      const material = new THREE.ShaderMaterial({
        uniforms: { uTime: { value: 0 } },
        vertexShader,
        fragmentShader,
        transparent: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false
      });

      diskParticles = new THREE.Points(geometry, material);
      diskParticles.userData = { layer: 'disk' };
      scene.add(diskParticles);
    }

    function createBulge() {
      const particleCount = 25000;
      const geometry = new THREE.BufferGeometry();
      const positions = new Float32Array(particleCount * 3);
      const colors = new Float32Array(particleCount * 3);
      const sizes = new Float32Array(particleCount);
      const alphas = new Float32Array(particleCount);

      const bulgeRadius = 7;
      const flatZ = 0.35;

      const colorCore = new THREE.Color(0xfff8e8);
      const colorMid = new THREE.Color(0xffd4a0);
      const colorWarm = new THREE.Color(0xffa040);
      const colorOuter = new THREE.Color(0xc87830);

      for (let i = 0; i < particleCount; i++) {
        const i3 = i * 3;

        const u = Math.random();
        const v = Math.random();
        const theta = 2 * Math.PI * u;
        const phi = Math.acos(2 * v - 1);

        const r = Math.pow(Math.random(), 1.8) * bulgeRadius;

        positions[i3] = r * Math.sin(phi) * Math.cos(theta);
        positions[i3 + 1] = r * Math.sin(phi) * Math.sin(theta) * flatZ;
        positions[i3 + 2] = r * Math.cos(phi);

        const distFromCenter = r / bulgeRadius;
        let color;
        let alpha;
        let size;

        if (distFromCenter < 0.15) {
          color = colorCore.clone();
          alpha = 0.9 + Math.random() * 0.1;
          size = 1.5 + Math.random() * 2;
        } else if (distFromCenter < 0.4) {
          color = colorCore.clone().lerp(colorMid, (distFromCenter - 0.15) / 0.25);
          alpha = 0.7 + Math.random() * 0.2;
          size = 1.0 + Math.random() * 1.5;
        } else if (distFromCenter < 0.7) {
          color = colorMid.clone().lerp(colorWarm, (distFromCenter - 0.4) / 0.3);
          alpha = 0.5 + Math.random() * 0.2;
          size = 0.6 + Math.random() * 1.0;
        } else {
          color = colorWarm.clone().lerp(colorOuter, (distFromCenter - 0.7) / 0.3);
          alpha = 0.3 + Math.random() * 0.2;
          size = 0.4 + Math.random() * 0.8;
        }

        colors[i3] = color.r;
        colors[i3 + 1] = color.g;
        colors[i3 + 2] = color.b;
        sizes[i] = size;
        alphas[i] = alpha;
      }

      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute('customColor', new THREE.BufferAttribute(colors, 3));
      geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
      geometry.setAttribute('alpha', new THREE.BufferAttribute(alphas, 1));

      const material = new THREE.ShaderMaterial({
        uniforms: { uTime: { value: 0 } },
        vertexShader,
        fragmentShader,
        transparent: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false
      });

      bulgeParticles = new THREE.Points(geometry, material);
      bulgeParticles.userData = { layer: 'bulge' };
      scene.add(bulgeParticles);
    }

    function createHalo() {
      const particleCount = 12000;
      const geometry = new THREE.BufferGeometry();
      const positions = new Float32Array(particleCount * 3);
      const colors = new Float32Array(particleCount * 3);
      const sizes = new Float32Array(particleCount);
      const alphas = new Float32Array(particleCount);

      const haloRadius = 70;
      const colorHalo = new THREE.Color(0x6a8ac8);
      const colorFaint = new THREE.Color(0x4a6080);

      for (let i = 0; i < particleCount; i++) {
        const i3 = i * 3;

        const u = Math.random();
        const v = Math.random();
        const theta = 2 * Math.PI * u;
        const phi = Math.acos(2 * v - 1);

        const r = 10 + Math.pow(Math.random(), 0.5) * (haloRadius - 10);

        positions[i3] = r * Math.sin(phi) * Math.cos(theta);
        positions[i3 + 1] = r * Math.sin(phi) * Math.sin(theta);
        positions[i3 + 2] = r * Math.cos(phi);

        const distRatio = (r - 10) / (haloRadius - 10);
        const brightness = 0.15 + Math.random() * 0.25 * (1 - distRatio * 0.5);
        const color = colorHalo.clone().lerp(colorFaint, distRatio + Math.random() * 0.3);

        colors[i3] = color.r * brightness;
        colors[i3 + 1] = color.g * brightness;
        colors[i3 + 2] = color.b * brightness;

        sizes[i] = 0.3 + Math.random() * 0.8;
        alphas[i] = 0.08 + Math.random() * 0.12;
      }

      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute('customColor', new THREE.BufferAttribute(colors, 3));
      geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
      geometry.setAttribute('alpha', new THREE.BufferAttribute(alphas, 1));

      const material = new THREE.ShaderMaterial({
        uniforms: { uTime: { value: 0 } },
        vertexShader,
        fragmentShader,
        transparent: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false
      });

      haloParticles = new THREE.Points(geometry, material);
      haloParticles.userData = { layer: 'halo' };
      scene.add(haloParticles);
    }

    function createDarkMatterHalo() {
      const particleCount = 5000;
      const geometry = new THREE.BufferGeometry();
      const positions = new Float32Array(particleCount * 3);
      const sizes = new Float32Array(particleCount);
      const alphas = new Float32Array(particleCount);

      const darkMatterRadius = 100;

      for (let i = 0; i < particleCount; i++) {
        const i3 = i * 3;

        const u = Math.random();
        const v = Math.random();
        const theta = 2 * Math.PI * u;
        const phi = Math.acos(2 * v - 1);

        const r = 40 + Math.pow(Math.random(), 0.3) * (darkMatterRadius - 40);

        positions[i3] = r * Math.sin(phi) * Math.cos(theta);
        positions[i3 + 1] = r * Math.sin(phi) * Math.sin(theta);
        positions[i3 + 2] = r * Math.cos(phi);

        const distFactor = 1 - (r - 40) / (darkMatterRadius - 40);
        sizes[i] = 6 + Math.random() * 10;
        alphas[i] = 0.03 + Math.random() * 0.06 * distFactor;
      }

      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
      geometry.setAttribute('alpha', new THREE.BufferAttribute(alphas, 1));

      const material = new THREE.ShaderMaterial({
        uniforms: { uTime: { value: 0 } },
        vertexShader: darkMatterVertexShader,
        fragmentShader: darkMatterFragmentShader,
        transparent: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false
      });

      darkMatterParticles = new THREE.Points(geometry, material);
      darkMatterParticles.userData = { layer: 'dark' };
      scene.add(darkMatterParticles);
    }

    function createBackgroundStars() {
      const particleCount = 3000;
      const geometry = new THREE.BufferGeometry();
      const positions = new Float32Array(particleCount * 3);
      const colors = new Float32Array(particleCount * 3);
      const sizes = new Float32Array(particleCount);

      for (let i = 0; i < particleCount; i++) {
        const i3 = i * 3;
        const radius = 250 + Math.random() * 400;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);

        positions[i3] = radius * Math.sin(phi) * Math.cos(theta);
        positions[i3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
        positions[i3 + 2] = radius * Math.cos(phi);

        const colorChoice = Math.random();
        const brightness = 0.3 + Math.random() * 0.5;
        if (colorChoice < 0.5) {
          colors[i3] = brightness; colors[i3 + 1] = brightness; colors[i3 + 2] = brightness;
        } else if (colorChoice < 0.75) {
          colors[i3] = brightness; colors[i3 + 1] = brightness * 0.9; colors[i3 + 2] = brightness * 0.75;
        } else {
          colors[i3] = brightness * 0.7; colors[i3 + 1] = brightness * 0.8; colors[i3 + 2] = brightness;
        }

        sizes[i] = 0.15 + Math.random() * 0.5;
      }

      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
      geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

      const material = new THREE.PointsMaterial({
        size: 0.8,
        vertexColors: true,
        transparent: true,
        opacity: 0.35,
        sizeAttenuation: true
      });

      const backgroundStars = new THREE.Points(geometry, material);
      scene.add(backgroundStars);
    }

    function highlightLayer(layer) {
      targetHighlight = layer;
      currentHighlight = layer;

      document.querySelectorAll('.layer-item').forEach(item => {
        item.classList.toggle('active', item.dataset.layer === layer);
      });

      document.getElementById('layer-title').textContent = layerInfo[layer].title;
      document.getElementById('layer-desc').textContent = layerInfo[layer].desc;
    }

    function setLayerOpacity(points, targetOpacity, layer) {
      if (!points) return;
      const alphaAttr = points.geometry.getAttribute('alpha');
      if (!alphaAttr) return;

      const currentOpacity = points.material.opacity || 1;
      const newOpacity = currentOpacity + (targetOpacity - currentOpacity) * 0.05;
      points.material.opacity = newOpacity;

      const alphaArray = alphaAttr.array;
      const targetAlpha = layer === currentHighlight ? 1 : 0.15;
      for (let i = 0; i < alphaArray.length; i++) {
        const baseAlpha = layer === 'disk' ? 0.75 :
                          layer === 'bulge' ? 1.0 :
                          layer === 'halo' ? 0.5 : 0.2;
        alphaArray[i] += (baseAlpha - alphaArray[i]) * 0.05;
      }
      alphaAttr.needsUpdate = true;
    }

    function setupEventListeners() {
      let isDragging = false;
      let previousMousePosition = { x: 0, y: 0 };
      let rotationVelocity = { x: 0, y: 0 };

      renderer.domElement.addEventListener('mousedown', (e) => {
        isDragging = true;
        previousMousePosition = { x: e.clientX, y: e.clientY };
      });

      renderer.domElement.addEventListener('mousemove', (e) => {
        if (!isDragging) return;

        const deltaX = e.clientX - previousMousePosition.x;
        const deltaY = e.clientY - previousMousePosition.y;

        rotationVelocity.x = deltaY * 0.002;
        rotationVelocity.y = deltaX * 0.002;

        previousMousePosition = { x: e.clientX, y: e.clientY };
      });

      renderer.domElement.addEventListener('mouseup', () => {
        isDragging = false;
      });

      renderer.domElement.addEventListener('mouseleave', () => {
        isDragging = false;
      });

      renderer.domElement.addEventListener('wheel', (e) => {
        e.preventDefault();
        const zoom = e.deltaY > 0 ? 1.05 : 0.95;
        camera.position.multiplyScalar(zoom);
      });

      let touchStartY = 0;
      renderer.domElement.addEventListener('touchstart', (e) => {
        touchStartY = e.touches[0].clientY;
      });

      renderer.domElement.addEventListener('touchmove', (e) => {
        const deltaY = e.touches[0].clientY - touchStartY;
        const zoom = deltaY > 0 ? 1.02 : 0.98;
        camera.position.multiplyScalar(zoom);
        touchStartY = e.touches[0].clientY;
      });

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
      });

      window.toggleFullscreen = function() {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(e => console.log('Fullscreen denied'));
        } else {
          document.exitFullscreen();
        }
      };
    }

    function animate() {
      requestAnimationFrame(animate);

      const time = performance.now() * 0.001;

      if (diskParticles) diskParticles.material.uniforms.uTime.value = time;
      if (bulgeParticles) bulgeParticles.material.uniforms.uTime.value = time;
      if (haloParticles) haloParticles.material.uniforms.uTime.value = time;
      if (darkMatterParticles) darkMatterParticles.material.uniforms.uTime.value = time;

      diskParticles.rotation.y += 0.0003;
      bulgeParticles.rotation.y += 0.0003;
      haloParticles.rotation.y += 0.0002;

      setLayerOpacity(diskParticles, currentHighlight === 'disk' ? 1 : 0.15, 'disk');
      setLayerOpacity(bulgeParticles, currentHighlight === 'bulge' ? 1 : 0.15, 'bulge');
      setLayerOpacity(haloParticles, currentHighlight === 'halo' ? 1 : 0.15, 'halo');
      setLayerOpacity(darkMatterParticles, currentHighlight === 'dark' ? 1 : 0.15, 'dark');

      camera.lookAt(0, 0, 0);
      composer.render();
    }

    window.goToSolarSystem = function() {
      const overlay = document.getElementById('transition-overlay');
      overlay.classList.add('fading');

      const ring = document.createElement('div');
      ring.className = 'transition-ring';
      overlay.appendChild(ring);

      setTimeout(() => {
        window.location.href = 'solar.html';
      }, 450);
    };

    window.highlightLayer = highlightLayer;
    window.toggleFullscreen = function() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(e => console.log('Fullscreen denied'));
      } else {
        document.exitFullscreen();
      }
    };

    init();
  </script>

  <script>
    function goBack() {
      const overlay = document.getElementById('transition-overlay');
      overlay.classList.add('fading');

      const ring = document.createElement('div');
      ring.className = 'transition-ring';
      overlay.appendChild(ring);

      setTimeout(() => {
        window.location.href = 'index.html';
      }, 450);
    }
  </script>
</body>
