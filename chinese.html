<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>国风元素 - 粒子宇宙</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      overflow: hidden;
      color: #fff;
    }

    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
    }

    #video-container {
      position: fixed;
      bottom: 20px;
      left: 20px;
      width: 160px;
      height: 120px;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid rgba(239, 68, 68, 0.5);
      box-shadow: 0 0 20px rgba(239, 68, 68, 0.3);
      z-index: 100;
      opacity: 0.8;
    }

    #video-container video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }

    #gesture-indicator {
      position: fixed;
      bottom: 145px;
      left: 20px;
      padding: 8px 14px;
      background: rgba(10, 10, 15, 0.85);
      border: 1px solid rgba(239, 68, 68, 0.4);
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      z-index: 100;
    }

    #gesture-indicator span { color: #ef4444; }

    #back-btn {
      position: fixed;
      top: 24px;
      left: 24px;
      padding: 12px 20px;
      background: rgba(15, 15, 25, 0.75);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 12px;
      color: #fff;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.25s ease;
    }

    #back-btn:hover {
      background: rgba(25, 25, 45, 0.9);
      border-color: rgba(239, 68, 68, 0.5);
      transform: translateX(-4px);
    }

    #control-panel {
      position: fixed;
      top: 50%;
      right: 24px;
      transform: translateY(-50%);
      width: 200px;
      background: rgba(15, 15, 25, 0.75);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(239, 68, 68, 0.25);
      border-radius: 16px;
      padding: 24px 20px;
      z-index: 100;
    }

    .panel-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 14px;
    }

    .model-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 28px;
    }

    .model-btn {
      padding: 12px 8px;
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.25);
      border-radius: 10px;
      color: #fff;
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .model-btn:hover {
      background: rgba(239, 68, 68, 0.25);
      border-color: rgba(239, 68, 68, 0.5);
    }

    .model-btn.active {
      background: rgba(239, 68, 68, 0.35);
      border-color: #ef4444;
    }

    .action-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, rgba(239, 68, 68, 0.6), rgba(220, 38, 38, 0.5));
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .action-btn:hover {
      background: linear-gradient(135deg, rgba(239, 68, 68, 0.75), rgba(220, 38, 38, 0.65));
    }

    #loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #0a0a0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.5s ease;
    }

    #loading-overlay.hidden { opacity: 0; pointer-events: none; }

    .loader {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(239, 68, 68, 0.2);
      border-top-color: #ef4444;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .loader-text { margin-top: 20px; font-size: 14px; color: rgba(255, 255, 255, 0.6); }

    #transition-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #0a0a0f;
      z-index: 9999;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    #transition-overlay.fading {
      opacity: 1;
      pointer-events: auto;
    }

    .transition-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border: 2px solid rgba(239, 68, 68, 0.6);
      border-radius: 50%;
      animation: ringExpand 0.5s ease forwards;
    }

    @keyframes ringExpand {
      from { width: 0; height: 0; opacity: 1; }
      to { width: 500px; height: 500px; opacity: 0; }
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #debug-info {
      position: fixed;
      bottom: 20px;
      right: 240px;
      color: #ef4444;
      font-size: 10px;
      z-index: 99;
      background: rgba(0,0,0,0.5);
      padding: 8px 12px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div id="loading-overlay">
    <div class="loader"></div>
    <p class="loader-text">正在生成国风元素...</p>
  </div>

  <div id="canvas-container"></div>
  <div id="transition-overlay"></div>

  <button id="back-btn" onclick="goBack()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
    返回首页
  </button>

  <div id="video-container">
    <video id="video" playsinline></video>
  </div>

  <div id="gesture-indicator">
    手势: <span id="gesture-status">等待检测</span>
  </div>

  <div id="control-panel">
    <div class="panel-title">选择元素</div>
    <div class="model-grid">
      <button class="model-btn active" data-model="taiji">☯️ 太极</button>
      <button class="model-btn" data-model="bluewhite">🏺 青花</button>
      <button class="model-btn" data-model="knot">🧶 中国结</button>
      <button class="model-btn" data-model="lantern">🏮 灯笼</button>
      <button class="model-btn" data-model="landscape">🏞️ 山水</button>
      <button class="model-btn" data-model="plum">🌸 梅花</button>
      <button class="model-btn" data-model="dragon">🐉 龙</button>
      <button class="model-btn" data-model="crane">🦢 仙鹤</button>
    </div>
    
    <div class="panel-title">手势说明</div>
    <div style="font-size: 10px; color: rgba(255,255,255,0.5); line-height: 1.6; margin-bottom: 20px;">
      双手张合 → 缩放<br>
      双手左右移动 → 旋转<br>
      单手指上下 → 翻转
    </div>

    <div class="panel-title">显示控制</div>
    <button class="action-btn" id="fullscreen-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
      </svg>
      全屏模式
    </button>
  </div>

  <div id="debug-info">Loading...</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    const PARTICLE_COUNT = 8000;
    const SCALE_LERP = 0.5;

    let scene, camera, renderer, composer;
    let particleSystem, starField;
    let currentModel = 'taiji';
    let targetScale = 1;
    let currentScale = 1;

    const modelPositions = {};
    const modelColors = {
      taiji: { light: 0xffffff, dark: 0x000000 },
      bluewhite: { light: 0x1A3A5C, dark: 0xF0F2F0 },
      knot: { light: 0xC41A1A, dark: 0xD4A843 },
      lantern: { light: 0xD42020, dark: 0xE8B84B },
      landscape: { light: 0x365314, dark: 0xd9f99d },
      plum: { light: 0xfda4af, dark: 0x881337 },
      dragon: { light: 0xfbbf24, dark: 0x92400e },
      crane: { light: 0xFFFFFF, dark: 0x1A1A1A }
    };

    const vertexShader = `
      attribute float size;
      attribute vec3 customColor;
      attribute float alpha;
      varying vec3 vColor;
      varying float vAlpha;
      uniform float uTime;
      uniform float uScale;

      void main() {
        vColor = customColor;
        vAlpha = alpha;
        vec3 pos = position * uScale;
        vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
        float pulse = 1.0 + 0.05 * sin(uTime * 1.2 + position.x * 1.5);
        gl_PointSize = size * pulse * (150.0 / -mvPosition.z);
        gl_Position = projectionMatrix * mvPosition;
      }
    `;

    const fragmentShader = `
      varying vec3 vColor;
      varying float vAlpha;
      uniform float uTime;

      void main() {
        vec2 center = gl_PointCoord - vec2(0.5);
        float dist = length(center);
        if (dist > 0.5) discard;

        float alpha = 1.0 - smoothstep(0.35, 0.5, dist);
        float pulse = 0.95 + 0.05 * sin(uTime * 1.2);
        gl_FragColor = vec4(vColor, alpha * vAlpha * pulse);
      }
    `;

    function generateTaijiPoints(count) {
      const points = [];
      const radius = 3;
      for (let i = 0; i < count; i++) {
        const theta = Math.random() * Math.PI * 2;
        const r = Math.sqrt(Math.random()) * radius;
        const x = r * Math.cos(theta);
        const y = r * Math.sin(theta);
        const z = (Math.random() - 0.5) * 0.2;
        
        let finalX = x;
        let finalY = y;
        
        const smallR = radius * 0.35;
        const halfR = radius * 0.5;
        
        if (y > 0) {
          if (x > 0) {
            if (r < halfR) {
              finalX = halfR + (x - halfR) * smallR / halfR;
              finalY = halfR + (y - halfR) * smallR / halfR;
            } else {
              const nx = (x - halfR) * (radius - smallR) / halfR;
              const ny = y;
              finalX = halfR + nx;
              finalY = ny;
            }
          } else {
            if (r < halfR) {
              finalX = -halfR + (x + halfR) * smallR / halfR;
              finalY = halfR + (y - halfR) * smallR / halfR;
            } else {
              const nx = (x + halfR) * (radius - smallR) / halfR;
              const ny = y;
              finalX = -halfR + nx;
              finalY = ny;
            }
          }
        } else {
          if (x < 0) {
            if (r < halfR) {
              finalX = -halfR + (x + halfR) * smallR / halfR;
              finalY = -halfR + (y + halfR) * smallR / halfR;
            } else {
              const nx = (x + halfR) * (radius - smallR) / halfR;
              const ny = y;
              finalX = -halfR + nx;
              finalY = ny;
            }
          } else {
            if (r < halfR) {
              finalX = halfR + (x - halfR) * smallR / halfR;
              finalY = -halfR + (y + halfR) * smallR / halfR;
            } else {
              const nx = (x - halfR) * (radius - smallR) / halfR;
              const ny = y;
              finalX = halfR + nx;
              finalY = ny;
            }
          }
        }
        
        points.push(new THREE.Vector3(finalX * 0.8, finalY * 0.8, z));
      }
      return points;
    }

    function generateBlueWhitePoints(count) {
      const points = [];
      const totalHeight = 8;
      const maxRadius = 2.8;

      function getRadiusAtHeight(h) {
        const t = h / totalHeight;
        if (t < 0.1) {
          return 0.6 + t * 2;
        } else if (t < 0.4) {
          const t2 = (t - 0.1) / 0.3;
          return 1.2 + Math.sin(t2 * Math.PI / 2) * (maxRadius - 1.2);
        } else if (t < 0.7) {
          const t2 = (t - 0.4) / 0.3;
          return maxRadius - Math.sin(t2 * Math.PI / 2) * (maxRadius - 0.9);
        } else if (t < 0.85) {
          return 0.9 + (t - 0.7) * 2;
        } else {
          return 1.2;
        }
      }

      for (let i = 0; i < count; i++) {
        let h, r, theta;
        
        const region = Math.random();
        if (region < 0.35) {
          h = Math.random() * totalHeight * 0.4;
        } else if (region < 0.7) {
          h = totalHeight * 0.4 + Math.random() * totalHeight * 0.3;
        } else {
          h = totalHeight * 0.7 + Math.random() * totalHeight * 0.3;
        }

        r = getRadiusAtHeight(h);
        
        const noise = (Math.random() - 0.5) * 0.08;
        theta = Math.random() * Math.PI * 2;
        
        const x = (r + noise) * Math.cos(theta);
        const y = h - totalHeight / 2;
        const z = (r + noise) * Math.sin(theta);

        points.push(new THREE.Vector3(x, y, z));
      }

      return points.slice(0, count);
    }

    function generateKnotPoints(count) {
      const points = [];
      const ropeRadius = 0.12;

      function addRopeSegment(x1, y1, x2, y2, particleCount, zOffset) {
        for (let i = 0; i < particleCount; i++) {
          const t = i / particleCount;
          const x = x1 + (x2 - x1) * t;
          const y = y1 + (y2 - y1) * t;
          const nx = (y2 - y1);
          const ny = -(x2 - x1);
          const len = Math.sqrt(nx * nx + ny * ny) || 1;
          const px = x + (nx / len) * (Math.random() - 0.5) * ropeRadius;
          const py = y + (ny / len) * (Math.random() - 0.5) * ropeRadius;
          points.push(new THREE.Vector3(px, py, zOffset + (Math.random() - 0.5) * 0.05));
        }
      }

      function addCircle(cx, cy, r, startAngle, endAngle, particleCount, zOffset) {
        for (let i = 0; i < particleCount; i++) {
          const t = i / particleCount;
          const angle = startAngle + (endAngle - startAngle) * t;
          const nr = r + (Math.random() - 0.5) * ropeRadius;
          points.push(new THREE.Vector3(
            cx + nr * Math.cos(angle),
            cy + nr * Math.sin(angle),
            zOffset + (Math.random() - 0.5) * 0.05
          ));
        }
      }

      // 中心菱形网格 (3x3)
      const gridSize = 0.5;
      const cells = 3;
      for (let row = 0; row <= cells; row++) {
        for (let col = 0; col <= cells; col++) {
          const x = (col - cells / 2) * gridSize;
          const y = (row - cells / 2) * gridSize;
          
          const dx = x * Math.cos(Math.PI / 4) - y * Math.sin(Math.PI / 4);
          const dy = x * Math.sin(Math.PI / 4) + y * Math.cos(Math.PI / 4);
          
          if (row < cells) {
            const x2 = (col - cells / 2) * gridSize;
            const y2 = ((row + 1) - cells / 2) * gridSize;
            const dx2 = x2 * Math.cos(Math.PI / 4) - y2 * Math.sin(Math.PI / 4);
            const dy2 = x2 * Math.sin(Math.PI / 4) + y2 * Math.cos(Math.PI / 4);
            addRopeSegment(dx, dy, dx2, dy2, 8, 0);
          }
          if (col < cells) {
            const x2 = ((col + 1) - cells / 2) * gridSize;
            const y2 = (row - cells / 2) * gridSize;
            const dx2 = x2 * Math.cos(Math.PI / 4) - y2 * Math.sin(Math.PI / 4);
            const dy2 = x2 * Math.sin(Math.PI / 4) + y2 * Math.cos(Math.PI / 4);
            addRopeSegment(dx, dy, dx2, dy2, 8, 0);
          }
        }
      }

      // 左右耳翼 (大圆环)
      addCircle(-1.8, 0, 0.8, 0, Math.PI * 2, Math.floor(count * 0.15), 0.08);
      addCircle(1.8, 0, 0.8, 0, Math.PI * 2, Math.floor(count * 0.15), 0.08);

      // 上下小耳翼
      addCircle(0, -1.6, 0.35, 0, Math.PI * 2, Math.floor(count * 0.06), -0.05);
      addCircle(0, 1.6, 0.35, 0, Math.PI * 2, Math.floor(count * 0.06), -0.05);

      // 连接绳带
      addRopeSegment(-1.8, -0.8, -0.8, -0.8, Math.floor(count * 0.05), 0);
      addRopeSegment(-1.8, 0.8, -0.8, 0.8, Math.floor(count * 0.05), 0);
      addRopeSegment(1.8, -0.8, 0.8, -0.8, Math.floor(count * 0.05), 0);
      addRopeSegment(1.8, 0.8, 0.8, 0.8, Math.floor(count * 0.05), 0);

      // 顶部挂绳
      addRopeSegment(0, 1.95, 0, 3.0, Math.floor(count * 0.06), 0);
      addCircle(0, 3.3, 0.2, 0, Math.PI * 2, Math.floor(count * 0.03), 0);

      // 底部穗子
      const tasselCount = Math.floor(count * 0.14);
      for (let i = 0; i < tasselCount; i++) {
        const t = i / tasselCount;
        const spread = Math.pow(t, 0.5) * 0.5;
        const angle = Math.random() * Math.PI * 2;
        const x = spread * Math.cos(angle);
        const y = -2.0 - t * 2.0;
        points.push(new THREE.Vector3(x, y, (Math.random() - 0.5) * 0.1));
      }

      // 确保恰好生成count个点
      while (points.length < count) {
        const t = Math.random();
        const spread = Math.pow(t, 0.5) * 2.5;
        const angle = Math.random() * Math.PI * 2;
        const x = spread * Math.cos(angle);
        const y = (Math.random() - 0.5) * 4;
        points.push(new THREE.Vector3(x, y, (Math.random() - 0.5) * 0.2));
      }

      return points.slice(0, count);
    }

    function generateLanternPoints(count) {
      const points = [];
      const bodyHeight = 3.0;
      const bodyRadius = 1.8;
      const ribCount = 12;

      // 鼓形主体表面粒子
      const bodyCount = Math.floor(count * 0.5);
      for (let i = 0; i < bodyCount; i++) {
        const theta = Math.random() * Math.PI * 2;
        const y = (Math.random() - 0.5) * bodyHeight;
        const curve = Math.cos(y / bodyHeight * Math.PI);
        const radius = bodyRadius * (0.75 + curve * 0.25);
        
        const x = radius * Math.cos(theta);
        const z = radius * Math.sin(theta);
        points.push(new THREE.Vector3(x, y, z));
      }

      // 金黄色骨架线（纵向棱线）
      const ribCountTotal = Math.floor(count * 0.18);
      for (let i = 0; i < ribCountTotal; i++) {
        const ribIndex = i % ribCount;
        const theta = ribIndex / ribCount * Math.PI * 2;
        const t = (i / ribCountTotal) % 1;
        const y = (t - 0.5) * bodyHeight;
        const curve = Math.cos(y / bodyHeight * Math.PI);
        const radius = bodyRadius * (0.75 + curve * 0.25) + 0.05;
        
        const x = radius * Math.cos(theta);
        const z = radius * Math.sin(theta);
        points.push(new THREE.Vector3(x, y, z));
      }

      // 上下金色边框（收口环）
      const rimCount = Math.floor(count * 0.06);
      const rimPositions = [-bodyHeight / 2, bodyHeight / 2];
      for (let r = 0; r < rimPositions.length; r++) {
        const rimY = rimPositions[r];
        const rimRadius = r === 0 ? 0.9 : 0.8;
        for (let i = 0; i < rimCount / 2; i++) {
          const theta = (i / (rimCount / 2)) * Math.PI * 2;
          const x = rimRadius * Math.cos(theta);
          const z = rimRadius * Math.sin(theta);
          const y = rimY + (Math.random() - 0.5) * 0.1;
          points.push(new THREE.Vector3(x, y, z));
        }
      }

      // 顶部红色挂绳
      const ropeCount = Math.floor(count * 0.04);
      for (let i = 0; i < ropeCount; i++) {
        const t = i / ropeCount;
        const y = bodyHeight / 2 + 0.3 + t * 1.0;
        const wave = Math.sin(t * Math.PI * 2) * 0.05;
        points.push(new THREE.Vector3(wave, y, 0));
      }

      // 底部穗子
      const tasselLength = bodyHeight * 1.5;
      const tasselCount = Math.floor(count * 0.18);
      for (let i = 0; i < tasselCount; i++) {
        const t = Math.random();
        const y = -bodyHeight / 2 - 0.3 - t * tasselLength;
        const spread = Math.pow(t, 0.5) * 0.5;
        const angle = Math.random() * Math.PI * 2;
        const r = spread * (0.5 + Math.random() * 0.5);
        
        const x = r * Math.cos(angle);
        const z = r * Math.sin(angle);
        points.push(new THREE.Vector3(x, y, z));
      }

      // 穗子顶部金色珠子
      const beadCount = Math.floor(count * 0.03);
      for (let i = 0; i < beadCount; i++) {
        const theta = Math.random() * Math.PI * 2;
        const r = Math.random() * 0.15;
        const x = r * Math.cos(theta);
        const z = r * Math.sin(theta);
        const y = -bodyHeight / 2 - 0.2;
        points.push(new THREE.Vector3(x, y, z));
      }

      // 确保恰好生成count个点
      while (points.length < count) {
        const theta = Math.random() * Math.PI * 2;
        const y = (Math.random() - 0.5) * bodyHeight;
        const curve = Math.cos(y / bodyHeight * Math.PI);
        const radius = bodyRadius * (0.75 + curve * 0.25);
        points.push(new THREE.Vector3(
          radius * Math.cos(theta),
          y,
          radius * Math.sin(theta)
        ));
      }

      return points.slice(0, count);
    }

    function generateLandscapePoints(count) {
      const points = [];
      for (let i = 0; i < count; i++) {
        const x = (Math.random() - 0.5) * 10;
        const z = (Math.random() - 0.5) * 6;
        
        const mountain1 = Math.sin(x * 0.3) * 2;
        const mountain2 = Math.sin(x * 0.5 + 1) * 1.5;
        const mountain3 = Math.sin(x * 0.8 + 2) * 1;
        const noise = (Math.random() - 0.5) * 0.4;
        
        let y = mountain1 + mountain2 + mountain3 + noise;
        y = Math.max(-1, y);
        
        if (z > 2 && Math.random() > 0.7) {
          y = Math.max(y, -0.5);
        }
        
        points.push(new THREE.Vector3(x, y, z));
      }
      
      for (let i = 0; i < count * 0.15; i++) {
        const x = (Math.random() - 0.5) * 8;
        const y = -1.2;
        const z = (Math.random() - 0.5) * 3;
        points.push(new THREE.Vector3(x, y, z));
      }
      
      return points;
    }

    function generatePlumPoints(count) {
      const points = [];
      const branches = [
        { startX: 0, startY: 0, angle: Math.PI * 0.3, length: 3 },
        { startX: 0, startY: 0, angle: Math.PI * 0.7, length: 2.5 },
        { startX: 0, startY: 0, angle: Math.PI * 1.1, length: 2 },
        { startX: 0, startY: 0, angle: Math.PI * 1.4, length: 2.8 }
      ];
      
      for (let i = 0; i < count; i++) {
        const branch = branches[Math.floor(Math.random() * branches.length)];
        const t = Math.random();
        const branchX = branch.startX + t * branch.length * Math.cos(branch.angle);
        const branchY = branch.startY + t * branch.length * Math.sin(branch.angle);
        const branchNoise = (Math.random() - 0.5) * 0.2;
        
        if (Math.random() > 0.6) {
          const petalAngle = Math.random() * Math.PI * 2;
          const petalDist = 0.2 + Math.random() * 0.3;
          const x = branchX + petalDist * Math.cos(petalAngle);
          const y = branchY + petalDist * Math.sin(petalAngle);
          const z = (Math.random() - 0.5) * 0.3;
          points.push(new THREE.Vector3(x, y, z));
        } else {
          const x = branchX + branchNoise;
          const y = branchY + branchNoise * 0.5;
          const z = (Math.random() - 0.5) * 0.2;
          points.push(new THREE.Vector3(x, y, z));
        }
      }
      return points;
    }

    function generateDragonPoints(count) {
      const points = [];
      for (let i = 0; i < count; i++) {
        const t = Math.random() * Math.PI * 8;
        const bodyRadius = 0.3 + Math.sin(t * 2) * 0.1;
        const noiseAngle = Math.random() * Math.PI * 2;
        const noiseDist = Math.random() * bodyRadius;
        
        const x = (Math.sin(t) + Math.sin(3 * t) * 0.3 + Math.cos(t * 1.5) * 0.2) + noiseDist * Math.cos(noiseAngle);
        const y = (Math.cos(t) + Math.cos(2 * t) * 0.4 + Math.sin(t * 2) * 0.2) + noiseDist * Math.sin(noiseAngle);
        const z = Math.sin(t * 1.8) * 0.6;
        
        points.push(new THREE.Vector3(x * 1.2, y * 1.2, z));
      }
      
      for (let i = 0; i < count * 0.1; i++) {
        const t = Math.random() * Math.PI * 8;
        const spikeLength = 0.4 + Math.random() * 0.3;
        const x = (Math.sin(t) + Math.sin(3 * t) * 0.3) + spikeLength * Math.cos(t * 3);
        const y = (Math.cos(t) + Math.cos(2 * t) * 0.4) + spikeLength * Math.sin(t * 3);
        const z = Math.sin(t * 1.8) * 0.6;
        points.push(new THREE.Vector3(x * 1.2, y * 1.2, z));
      }
      
      return points;
    }

    function generateCranePoints(count) {
      const points = [];
      const bodyCenter = { x: 0, y: 0, z: 0 };
      const wingSpan = 7;

      // 头部 - 向前伸展
      const headCount = Math.floor(count * 0.06);
      for (let i = 0; i < headCount; i++) {
        const theta = Math.random() * Math.PI * 2;
        const r = Math.random() * 0.3;
        const x = 1.8 + r * Math.cos(theta);
        const y = 1.5 + r * Math.sin(theta) * 0.5;
        const z = (Math.random() - 0.5) * 0.2;
        points.push(new THREE.Vector3(x, y, z));
      }

      // 丹顶（红色头顶）
      const crestCount = Math.floor(count * 0.02);
      for (let i = 0; i < crestCount; i++) {
        const theta = Math.random() * Math.PI * 2;
        const r = Math.random() * 0.15;
        const x = 1.8 + r * Math.cos(theta);
        const y = 1.8 + r * Math.sin(theta);
        const z = (Math.random() - 0.5) * 0.1;
        points.push(new THREE.Vector3(x, y, z));
      }

      // 颈部 - S形曲线，黑色
      const neckCount = Math.floor(count * 0.12);
      for (let i = 0; i < neckCount; i++) {
        const t = i / neckCount;
        const x = 1.2 - t * 1.5;
        const y = 1.2 + Math.sin(t * Math.PI) * 0.6;
        const z = (Math.random() - 0.5) * 0.15;
        points.push(new THREE.Vector3(x, y, z));
      }

      // 身体 - 白色椭圆体
      const bodyCount = Math.floor(count * 0.18);
      for (let i = 0; i < bodyCount; i++) {
        const theta = Math.random() * Math.PI * 2;
        const r = Math.random() * 0.7;
        const x = r * Math.cos(theta) * 1.2 - 0.3;
        const y = r * Math.sin(theta) * 0.5;
        const z = (Math.random() - 0.5) * 0.4;
        points.push(new THREE.Vector3(x, y, z));
      }

      // 翅膀 - 向两侧展开，前缘白色，后缘黑色
      const wingCount = Math.floor(count * 0.38);
      for (let i = 0; i < wingCount; i++) {
        const side = i < wingCount / 2 ? 1 : -1;
        const t = (i % Math.floor(wingCount / 2)) / (wingCount / 2);
        
        // 翅膀扇形展开
        const wingAngle = t * Math.PI * 0.85;
        const span = Math.sin(wingAngle) * wingSpan / 2;
        const sweep = Math.cos(wingAngle) * 2.5;
        
        const x = -0.5 + sweep * 0.3;
        const y = side * span;
        const z = (Math.random() - 0.5) * (1.0 - t * 0.6);
        
        points.push(new THREE.Vector3(x, y, z));
      }

      // 翅膀黑色尖端
      const wingTipCount = Math.floor(count * 0.08);
      for (let i = 0; i < wingTipCount; i++) {
        const side = i < wingTipCount / 2 ? 1 : -1;
        const t = (i % Math.floor(wingTipCount / 2)) / (wingTipCount / 2);
        const angle = t * Math.PI * 0.3;
        const span = wingSpan / 2 + Math.sin(angle) * 1.5;
        
        const x = -0.8 + t * 0.5;
        const y = side * span;
        const z = (Math.random() - 0.5) * 0.3;
        points.push(new THREE.Vector3(x, y, z));
      }

      // 尾巴 - 黑色长羽向后伸展
      const tailCount = Math.floor(count * 0.1);
      for (let i = 0; i < tailCount; i++) {
        const t = Math.random();
        const x = -1.0 - t * 2.5;
        const spread = t * 1.2;
        const y = (Math.random() - 0.5) * spread;
        const z = (Math.random() - 0.5) * 0.3;
        points.push(new THREE.Vector3(x, y, z));
      }

      // 腿部 - 向后伸直
      const legCount = Math.floor(count * 0.04);
      for (let i = 0; i < legCount; i++) {
        const legIndex = i % 2;
        const t = (i / legCount) % 1;
        const legY = legIndex === 0 ? -0.3 : 0.3;
        const x = -0.5 - t * 2.0;
        const y = legY + (Math.random() - 0.5) * 0.05;
        const z = (Math.random() - 0.5) * 0.05;
        points.push(new THREE.Vector3(x, y, z));
      }

      // 确保恰好生成count个点
      while (points.length < count) {
        const theta = Math.random() * Math.PI * 2;
        const r = Math.random() * 2;
        const x = r * Math.cos(theta) - 0.3;
        const y = (Math.random() - 0.5) * 4;
        const z = (Math.random() - 0.5) * 3;
        points.push(new THREE.Vector3(x, y, z));
      }

      return points.slice(0, count);
    }

    function generateStarField(count) {
      const geometry = new THREE.BufferGeometry();
      const positions = new Float32Array(count * 3);
      const colors = new Float32Array(count * 3);
      for (let i = 0; i < count; i++) {
        const i3 = i * 3;
        const radius = 50 + Math.random() * 100;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        positions[i3] = radius * Math.sin(phi) * Math.cos(theta);
        positions[i3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
        positions[i3 + 2] = radius * Math.cos(phi);
        const brightness = 0.3 + Math.random() * 0.7;
        colors[i3] = brightness;
        colors[i3 + 1] = brightness;
        colors[i3 + 2] = brightness + Math.random() * 0.2;
      }
      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
      const material = new THREE.PointsMaterial({
        size: 0.5,
        vertexColors: true,
        transparent: true,
        opacity: 0.8,
        sizeAttenuation: true
      });
      return new THREE.Points(geometry, material);
    }

    function initModelPositions() {
      modelPositions.taiji = generateTaijiPoints(PARTICLE_COUNT);
      modelPositions.bluewhite = generateBlueWhitePoints(PARTICLE_COUNT);
      modelPositions.knot = generateKnotPoints(PARTICLE_COUNT);
      modelPositions.lantern = generateLanternPoints(PARTICLE_COUNT);
      modelPositions.landscape = generateLandscapePoints(PARTICLE_COUNT);
      modelPositions.plum = generatePlumPoints(PARTICLE_COUNT);
      modelPositions.dragon = generateDragonPoints(PARTICLE_COUNT);
      modelPositions.crane = generateCranePoints(PARTICLE_COUNT);
    }

    function createParticleSystem() {
      const geometry = new THREE.BufferGeometry();
      const positions = new Float32Array(PARTICLE_COUNT * 3);
      const colors = new Float32Array(PARTICLE_COUNT * 3);
      const sizes = new Float32Array(PARTICLE_COUNT);
      const alphas = new Float32Array(PARTICLE_COUNT);

      for (let i = 0; i < PARTICLE_COUNT; i++) {
        positions[i * 3] = 0;
        positions[i * 3 + 1] = 0;
        positions[i * 3 + 2] = 0;
        colors[i * 3] = 0.5;
        colors[i * 3 + 1] = 0.5;
        colors[i * 3 + 2] = 0.5;
        sizes[i] = 0.6 + Math.random() * 0.6;
        alphas[i] = 0.8 + Math.random() * 0.2;
      }

      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute('customColor', new THREE.BufferAttribute(colors, 3));
      geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
      geometry.setAttribute('alpha', new THREE.BufferAttribute(alphas, 1));

      const material = new THREE.ShaderMaterial({
        uniforms: {
          uTime: { value: 0 },
          uScale: { value: 1 }
        },
        vertexShader,
        fragmentShader,
        transparent: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false
      });

      particleSystem = new THREE.Points(geometry, material);
      scene.add(particleSystem);

      setModel('taiji');
    }

    function setModel(modelName) {
      currentModel = modelName;
      
      document.querySelectorAll('.model-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.model === modelName);
      });

      const positions = particleSystem.geometry.attributes.position;
      const colors = particleSystem.geometry.attributes.customColor;
      const targetPositions = modelPositions[modelName];
      const colorConfig = modelColors[modelName];

      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const targetPos = targetPositions[i];
        positions.array[i * 3] += (targetPos.x - positions.array[i * 3]) * 0.03;
        positions.array[i * 3 + 1] += (targetPos.y - positions.array[i * 3 + 1]) * 0.03;
        positions.array[i * 3 + 2] += (targetPos.z - positions.array[i * 3 + 2]) * 0.03;
        
        let targetColor = getModelColor(modelName, targetPos, i);
        
        colors.array[i * 3] += (targetColor.r - colors.array[i * 3]) * 0.05;
        colors.array[i * 3 + 1] += (targetColor.g - colors.array[i * 3 + 1]) * 0.05;
        colors.array[i * 3 + 2] += (targetColor.b - colors.array[i * 3 + 2]) * 0.05;
      }
      positions.needsUpdate = true;
      colors.needsUpdate = true;
    }

    function getModelColor(modelName, pos, index) {
      const colorConfig = modelColors[modelName];
      
      switch (modelName) {
        case 'taiji':
          const theta = Math.atan2(pos.y, pos.x);
          return new THREE.Color(theta > 0 ? colorConfig.light : colorConfig.dark);
        
        case 'lantern':
          // 骨架线/边框/珠子 - 金色
          if (Math.abs(pos.y) > 1.35 || pos.y < -1.65 || (pos.y > 1.5 && pos.y < 2.5)) {
            return new THREE.Color(colorConfig.dark);
          }
          // 穗子顶部珠子
          if (pos.y > -1.8 && pos.y < -1.5 && Math.abs(pos.x) < 0.2 && Math.abs(pos.z) < 0.2) {
            return new THREE.Color(0xFFD700);
          }
          return new THREE.Color(colorConfig.light);
        
        case 'crane':
          // 丹顶 - 红色
          if (pos.x > 1.6 && pos.y > 1.6) {
            return new THREE.Color(0xC41A1A);
          }
          // 颈部/翅膀尖/尾巴 - 黑色
          if ((pos.x > 0.8 && pos.y > 0.5 && pos.y < 1.8) || 
              (Math.abs(pos.y) > 3.0) || 
              (pos.x < -1.0)) {
            return new THREE.Color(colorConfig.dark);
          }
          // 腿部 - 深灰
          if (pos.x < -0.3 && Math.abs(pos.y) < 0.5) {
            return new THREE.Color(0x3A3A3A);
          }
          return new THREE.Color(colorConfig.light);
        
        default:
          const useLight = Math.random() > 0.4;
          return new THREE.Color(useLight ? colorConfig.light : colorConfig.dark);
      }
    }

    function updateParticlePositions() {
      const positions = particleSystem.geometry.attributes.position;
      const colors = particleSystem.geometry.attributes.customColor;
      const targetPositions = modelPositions[currentModel];

      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const targetPos = targetPositions[i];
        positions.array[i * 3] += (targetPos.x - positions.array[i * 3]) * 0.03;
        positions.array[i * 3 + 1] += (targetPos.y - positions.array[i * 3 + 1]) * 0.03;
        positions.array[i * 3 + 2] += (targetPos.z - positions.array[i * 3 + 2]) * 0.03;

        let targetColor = getModelColor(currentModel, targetPos, i);
        
        colors.array[i * 3] += (targetColor.r - colors.array[i * 3]) * 0.03;
        colors.array[i * 3 + 1] += (targetColor.g - colors.array[i * 3 + 1]) * 0.03;
        colors.array[i * 3 + 2] += (targetColor.b - colors.array[i * 3 + 2]) * 0.03;
      }
      positions.needsUpdate = true;
      colors.needsUpdate = true;
    }

    function updateDebugInfo(text) {
      document.getElementById('debug-info').textContent = text;
    }

    function init() {
      try {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0f);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 12;

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const renderPass = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(
          new THREE.Vector2(window.innerWidth, window.innerHeight),
          0.08, 0.4, 0.6
        );

        composer = new EffectComposer(renderer);
        composer.addPass(renderPass);
        composer.addPass(bloomPass);

        initModelPositions();
        createParticleSystem();

        starField = generateStarField(500);
        scene.add(starField);

        setupEventListeners();

        setTimeout(() => {
          document.getElementById('loading-overlay').classList.add('hidden');
          startHandTracking();
        }, 800);

        animate();
      } catch (error) {
        console.error('Initialization error:', error);
        alert('初始化失败: ' + error.message);
        document.getElementById('loading-overlay').classList.add('hidden');
      }
    }

    async function startHandTracking() {
      try {
        updateDebugInfo('Initializing camera...');
        
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { width: 640, height: 480, facingMode: 'user' }
        });
        
        const video = document.getElementById('video');
        video.srcObject = stream;
        await video.play();

        updateDebugInfo('Loading MediaPipe...');

        if (!window.Hands || !window.Camera) {
          throw new Error('MediaPipe modules not loaded');
        }

        const hands = new window.Hands({
          locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${file}`
        });

        hands.setOptions({
          maxNumHands: 2,
          modelComplexity: 1,
          minDetectionConfidence: 0.6,
          minTrackingConfidence: 0.6
        });

        let lastHandX = 0.5;
        let lastHandY = 0.5;
        let lastIndexTipY = 0.5;
        let rotationVelocity = 0;
        let flipVelocity = 0;

        hands.onResults((results) => {
          if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
            document.getElementById('gesture-status').textContent = '等待检测';
            updateDebugInfo('Status: No hands');
            rotationVelocity *= 0.95;
            flipVelocity *= 0.95;
            return;
          }

          const numHands = results.multiHandLandmarks.length;
          let totalOpenness = 0;
          let handX = 0;
          let handY = 0;
          let validHands = 0;
          let indexTipY = 0;
          let hasExtendedIndexFinger = false;

          for (let i = 0; i < numHands; i++) {
            const landmarks = results.multiHandLandmarks[i];
            if (landmarks && landmarks.length >= 21) {
              const palm = landmarks[0];
              const index = landmarks[8];
              const middle = landmarks[12];
              const ring = landmarks[16];
              const pinky = landmarks[20];
              
              const indexDist = Math.hypot(palm.x - index.x, palm.y - index.y);
              const middleDist = Math.hypot(palm.x - middle.x, palm.y - middle.y);
              const pinkyDist = Math.hypot(palm.x - pinky.x, palm.y - pinky.y);
              const avgDist = (indexDist + middleDist + pinkyDist) / 3;
              
              totalOpenness += Math.min(Math.max((avgDist - 0.06) / 0.18, 0), 1);
              
              handX += palm.x;
              handY += palm.y;
              validHands++;
              
              const indexExtended = index.y < landmarks[6].y && index.y < landmarks[7].y;
              const middleExtended = middle.y < landmarks[10].y && middle.y < landmarks[11].y;
              const ringExtended = ring.y < landmarks[14].y && ring.y < landmarks[15].y;
              const pinkyExtended = pinky.y < landmarks[18].y && pinky.y < landmarks[19].y;
              
              const extendedCount = [indexExtended, middleExtended, ringExtended, pinkyExtended].filter(Boolean).length;
              
              if (indexExtended && extendedCount <= 2) {
                indexTipY += index.y;
                hasExtendedIndexFinger = true;
              }
            }
          }

          const avgOpenness = validHands > 0 ? totalOpenness / validHands : 0;
          targetScale = 0.25 + avgOpenness * 3.5;

          if (validHands > 0) {
            const currentHandX = handX / validHands;
            const currentHandY = handY / validHands;
            const deltaX = currentHandX - lastHandX;
            rotationVelocity = deltaX * 12;
            lastHandX = lastHandX * 0.3 + currentHandX * 0.7;
            lastHandY = lastHandY * 0.3 + currentHandY * 0.7;

            if (numHands === 1 && hasExtendedIndexFinger) {
              const currentIndexTipY = indexTipY / validHands;
              const deltaY = currentIndexTipY - lastIndexTipY;
              flipVelocity = deltaY * 15;
              lastIndexTipY = lastIndexTipY * 0.3 + currentIndexTipY * 0.7;
            } else {
              flipVelocity *= 0.95;
            }
          }

          window.targetRotation = (window.targetRotation || 0) + rotationVelocity;
          window.targetFlip = (window.targetFlip || 0) + flipVelocity;

          const statusText = avgOpenness > 0.75 ? '张开 ✓' : avgOpenness < 0.25 ? '合拢 ✓' : '调整中...';
          const rotIndicator = Math.abs(rotationVelocity) > 0.03 ? (rotationVelocity > 0 ? ' ↻' : ' ↺') : '';
          const flipIndicator = Math.abs(flipVelocity) > 0.03 ? (flipVelocity > 0 ? ' ↓' : ' ↑') : '';
          document.getElementById('gesture-status').textContent = statusText + rotIndicator + flipIndicator + ' (' + validHands + '手)';
          updateDebugInfo(`O:${avgOpenness.toFixed(2)} S:${targetScale.toFixed(2)} R:${rotationVelocity.toFixed(3)} F:${flipVelocity.toFixed(3)}`);
        });

        const camera = new window.Camera(video, {
          onFrame: async () => {
            if (hands) await hands.send({ image: video });
          },
          width: 640,
          height: 480
        });

        await camera.start();
        updateDebugInfo('Hand tracking: ✓ Active');

      } catch (error) {
        console.warn('Camera/Hand tracking error:', error);
        document.getElementById('video-container').style.display = 'none';
        document.getElementById('gesture-indicator').innerHTML = '手势: <span style="color:#f59e0b">摄像头不可用</span>';
        updateDebugInfo('备用控制: 鼠标滚轮缩放, 拖拽旋转');
        document.getElementById('gesture-indicator').style.background = 'rgba(245, 158, 11, 0.2)';
        document.getElementById('gesture-indicator').style.borderColor = 'rgba(245, 158, 11, 0.5)';
      }
    }

    function setupEventListeners() {
      document.querySelectorAll('.model-btn').forEach(btn => {
        btn.addEventListener('click', () => setModel(btn.dataset.model));
      });

      document.getElementById('fullscreen-btn').addEventListener('click', () => {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen();
        } else {
          document.exitFullscreen();
        }
      });

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
      });

      window.addEventListener('wheel', (e) => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? -0.1 : 0.1;
        targetScale = Math.max(0.4, Math.min(2.2, targetScale + delta));
      });
    }

    function updateChineseDynamics(time) {
      const positions = particleSystem.geometry.attributes.position;
      const targetPositions = modelPositions[currentModel];
      
      if (!targetPositions) return;

      switch (currentModel) {
        case 'bluewhite':
          for (let i = 0; i < PARTICLE_COUNT; i++) {
            const targetPos = targetPositions[i];
            const pulse = Math.sin(time * 1.5 + i * 0.05) * 0.02;
            positions.array[i * 3] += (targetPos.x - positions.array[i * 3]) * 0.03 + (Math.random() - 0.5) * 0.002;
            positions.array[i * 3 + 1] += (targetPos.y - positions.array[i * 3 + 1]) * 0.03 + pulse;
            positions.array[i * 3 + 2] += (targetPos.z - positions.array[i * 3 + 2]) * 0.03 + (Math.random() - 0.5) * 0.002;
          }
          break;

        case 'knot':
          for (let i = 0; i < PARTICLE_COUNT; i++) {
            const targetPos = targetPositions[i];
            const flow = Math.sin(time * 0.5 + i * 0.02) * 0.03;
            positions.array[i * 3] += (targetPos.x - positions.array[i * 3]) * 0.03 + flow * 0.3;
            positions.array[i * 3 + 1] += (targetPos.y - positions.array[i * 3 + 1]) * 0.03 + flow * 0.3;
            positions.array[i * 3 + 2] += (targetPos.z - positions.array[i * 3 + 2]) * 0.03;
          }
          break;

        case 'lantern':
          const floatOffset = Math.sin(time * 2) * 0.3;
          for (let i = 0; i < PARTICLE_COUNT; i++) {
            const targetPos = targetPositions[i];
            const isTassel = targetPos.y < -1.5;
            const swing = isTassel ? Math.sin(time * 1.2 + i * 0.08) * 0.15 : 0;
            const bob = isTassel ? Math.sin(time * 2 + i * 0.05) * 0.08 : 0;
            
            positions.array[i * 3] += (targetPos.x - positions.array[i * 3]) * 0.03 + swing;
            positions.array[i * 3 + 1] += (targetPos.y - positions.array[i * 3 + 1]) * 0.03 + floatOffset + bob;
            positions.array[i * 3 + 2] += (targetPos.z - positions.array[i * 3 + 2]) * 0.03 + swing * 0.5;
          }
          break;

        case 'crane':
          const breatheOffset = Math.sin(time * 1.2) * 0.15;
          for (let i = 0; i < PARTICLE_COUNT; i++) {
            const targetPos = targetPositions[i];
            const isNeck = targetPos.y > 3 && Math.abs(targetPos.x) < 1;
            const isWing = Math.abs(targetPos.x) > 1;
            const isTail = targetPos.x < -0.3 && targetPos.y < 1.5;
            
            let dx = 0, dy = 0, dz = 0;
            
            if (isNeck) {
              const wave = Math.sin(time * 0.8 + targetPos.y * 2) * 0.08;
              dx = wave;
              dz = Math.sin(time * 0.6 + targetPos.y) * 0.05;
            }
            
            if (isWing) {
              const flap = Math.sin(time * 0.5 + targetPos.x) * 0.12;
              dy = flap;
              dz = Math.cos(time * 0.4 + targetPos.x) * 0.05;
            }
            
            if (isTail) {
              const sway = Math.sin(time * 0.7 + targetPos.x * 3) * 0.1;
              dx += sway;
              dz += Math.cos(time * 0.5 + targetPos.x * 2) * 0.05;
            }
            
            positions.array[i * 3] += (targetPos.x - positions.array[i * 3]) * 0.03 + dx;
            positions.array[i * 3 + 1] += (targetPos.y - positions.array[i * 3 + 1]) * 0.03 + breatheOffset + dy;
            positions.array[i * 3 + 2] += (targetPos.z - positions.array[i * 3 + 2]) * 0.03 + dz;
          }
          break;
      }
      
      positions.needsUpdate = true;
    }

    function animate() {
      requestAnimationFrame(animate);

      const time = performance.now() * 0.001;

      particleSystem.material.uniforms.uTime.value = time;
      currentScale += (targetScale - currentScale) * SCALE_LERP;
      particleSystem.material.uniforms.uScale.value = currentScale;
      updateParticlePositions();

      updateChineseDynamics(time);

      if (window.targetRotation !== undefined) {
        particleSystem.rotation.y += (window.targetRotation - particleSystem.rotation.y) * 0.4;
        starField.rotation.y = particleSystem.rotation.y * 0.4;
      } else {
        particleSystem.rotation.y = time * 0.05;
        starField.rotation.y = time * 0.02;
      }

      if (window.targetFlip !== undefined) {
        particleSystem.rotation.x += (window.targetFlip - particleSystem.rotation.x) * 0.4;
      }

      composer.render();
    }

    init();
  </script>

  <script>
    function goBack() {
      const overlay = document.getElementById('transition-overlay');
      overlay.classList.add('fading');
      
      const ring = document.createElement('div');
      ring.className = 'transition-ring';
      overlay.appendChild(ring);
      
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 400);
    }
  </script>
