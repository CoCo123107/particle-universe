<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>粒子宇宙 - 3D交互式粒子系统</title>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      overflow: hidden;
      color: #fff;
    }

    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
    }

    #content {
      position: relative;
      z-index: 10;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      backdrop-filter: blur(8px);
    }

    .logo-section {
      text-align: center;
      margin-bottom: 60px;
      animation: fadeInDown 0.8s ease-out;
    }

    .logo {
      font-size: 48px;
      font-weight: 700;
      background: linear-gradient(135deg, #8b5cf6, #06b6d4, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
      letter-spacing: 2px;
    }

    .subtitle {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.6);
      font-weight: 400;
    }

    .category-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      max-width: 900px;
      width: 100%;
      animation: fadeInUp 0.8s ease-out 0.2s both;
    }

    .category-card {
      position: relative;
      background: rgba(20, 20, 35, 0.6);
      border: 1px solid rgba(139, 92, 246, 0.2);
      border-radius: 20px;
      padding: 32px 24px;
      cursor: pointer;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
    }

    .category-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, #8b5cf6, transparent);
      opacity: 0;
      transition: opacity 0.35s;
    }

    .category-card:hover {
      transform: translateY(-8px);
      background: rgba(25, 25, 45, 0.8);
      border-color: rgba(139, 92, 246, 0.5);
      box-shadow: 0 20px 40px rgba(139, 92, 246, 0.2);
    }

    .category-card:hover::before {
      opacity: 1;
    }

    .category-icon {
      font-size: 48px;
      margin-bottom: 16px;
      display: block;
      text-align: center;
    }

    .category-title {
      font-size: 20px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 8px;
      color: #fff;
    }

    .category-desc {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.5);
      text-align: center;
      line-height: 1.5;
    }

    .feature-tags {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px;
      margin-top: 16px;
    }

    .tag {
      font-size: 11px;
      padding: 4px 10px;
      background: rgba(139, 92, 246, 0.15);
      border-radius: 20px;
      color: rgba(139, 92, 246, 0.8);
      border: 1px solid rgba(139, 92, 246, 0.2);
    }

    .footer {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: rgba(255, 255, 255, 0.3);
      animation: fadeIn 1s ease-out 0.6s both;
    }

    #transition-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #0a0a0f;
      z-index: 9999;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    #transition-overlay.fading {
      opacity: 1;
      pointer-events: auto;
    }

    .transition-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border: 2px solid rgba(139, 92, 246, 0.6);
      border-radius: 50%;
      animation: ringExpand 0.5s ease forwards;
    }

    @keyframes ringExpand {
      from { width: 0; height: 0; opacity: 1; }
      to { width: 500px; height: 500px; opacity: 0; }
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @media (max-width: 768px) {
      .category-grid {
        grid-template-columns: 1fr;
        gap: 16px;
        max-width: 320px;
      }

      .logo {
        font-size: 32px;
      }

      .subtitle {
        font-size: 14px;
      }

      #content {
        padding: 20px;
      }

      .logo-section {
        margin-bottom: 40px;
      }
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="transition-overlay"></div>
  
  <div id="content">
    <div class="logo-section">
      <h1 class="logo">粒子宇宙</h1>
      <p class="subtitle">3D Interactive Particle System</p>
    </div>

    <div class="category-grid">
      <div class="category-card" onclick="navigateTo('shapes')">
        <span class="category-icon">✨</span>
        <h2 class="category-title">粒子形态库</h2>
        <p class="category-desc">探索数学之美，发现粒子构成的奇妙形态</p>
        <div class="feature-tags">
          <span class="tag">玫瑰</span>
          <span class="tag">星星</span>
          <span class="tag">DNA</span>
          <span class="tag">晶体</span>
        </div>
      </div>

      <div class="category-card" onclick="navigateTo('galaxy')">
        <span class="category-icon">🌌</span>
        <h2 class="category-title">银河系</h2>
        <p class="category-desc">探索银河的壮丽结构，从银心到旋臂，再到暗物质晕</p>
        <div class="feature-tags">
          <span class="tag">银盘</span>
          <span class="tag">银心</span>
          <span class="tag">银晕</span>
          <span class="tag">暗物质</span>
        </div>
      </div>

      <div class="category-card" onclick="navigateTo('fluid')">
        <span class="category-icon">�</span>
        <h2 class="category-title">流体式冥想</h2>
        <p class="category-desc">触碰即流动，呼吸间幻化，在粒子中沉淀心境</p>
        <div class="feature-tags">
          <span class="tag">流沙</span>
          <span class="tag">光团</span>
          <span class="tag">拂尘</span>
          <span class="tag">涟漪</span>
        </div>
      </div>
    </div>

    <div class="footer">
      基于 Three.js · MediaPipe Hands
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';

    const PARTICLE_COUNT = 3000;
    
    let scene, camera, renderer;
    let particles;

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0a0a0f);

      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.z = 5;

      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      document.getElementById('canvas-container').appendChild(renderer.domElement);

      createParticles();
      animate();
    }

    function createParticles() {
      const geometry = new THREE.BufferGeometry();
      const positions = new Float32Array(PARTICLE_COUNT * 3);
      const colors = new Float32Array(PARTICLE_COUNT * 3);

      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const i3 = i * 3;
        const radius = 3 + Math.random() * 7;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);

        positions[i3] = radius * Math.sin(phi) * Math.cos(theta);
        positions[i3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
        positions[i3 + 2] = radius * Math.cos(phi);

        const colorChoice = Math.random();
        if (colorChoice < 0.33) {
          colors[i3] = 139 / 255;
          colors[i3 + 1] = 92 / 255;
          colors[i3 + 2] = 246 / 255;
        } else if (colorChoice < 0.66) {
          colors[i3] = 6 / 255;
          colors[i3 + 1] = 182 / 255;
          colors[i3 + 2] = 212 / 255;
        } else {
          colors[i3] = 236 / 255;
          colors[i3 + 1] = 72 / 255;
          colors[i3 + 2] = 153 / 255;
        }
      }

      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

      const material = new THREE.PointsMaterial({
        size: 0.08,
        vertexColors: true,
        transparent: true,
        opacity: 0.7,
        sizeAttenuation: true
      });

      particles = new THREE.Points(geometry, material);
      scene.add(particles);
    }

    function animate() {
      requestAnimationFrame(animate);

      const time = performance.now() * 0.0003;

      particles.rotation.y = time;
      particles.rotation.x = Math.sin(time * 0.5) * 0.1;

      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    init();
  </script>

  <script>
    function navigateTo(page) {
      const pages = {
        shapes: 'shapes.html',
        solar: 'solar.html',
        galaxy: 'galaxy.html',
        fluid: 'fluid.html'
      };
      
      const overlay = document.getElementById('transition-overlay');
      overlay.classList.add('fading');
      
      const ring = document.createElement('div');
      ring.className = 'transition-ring';
      overlay.appendChild(ring);
      
      setTimeout(() => {
        window.location.href = pages[page];
      }, 400);
    }
  </script>
</body>
</html>
